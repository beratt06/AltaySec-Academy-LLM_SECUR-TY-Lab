server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Güvenlik Header'ları ───────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"               always;
    add_header X-Frame-Options         "DENY"                  always;
    add_header Referrer-Policy         "no-referrer"           always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://generativelanguage.googleapis.com https://api.groq.com; img-src 'self' data:;" always;

    # ── Statik dosyalar ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        if_modified_since off;
        expires off;
        etag off;
    }

    # ── Backend API proxy ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }
}
